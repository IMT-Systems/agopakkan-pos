<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>あごぱっかーん — 売上カウンター</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

:root{
  --ink:#2A1A0E;
  --board:#3A2817;
  --mustard:#F2B705;
  --ketchup:#C0392B;
  --lettuce:#B9791F;
  --paper:#FBF1DE;
  --paper-dim:#E9D3A6;
  --bg:#180F08;
}

*{box-sizing:border-box; margin:0; padding:0;}

body{
  background:var(--bg);
  background-image:
    radial-gradient(circle at 15% 20%, rgba(242,183,5,0.07), transparent 40%),
    radial-gradient(circle at 85% 80%, rgba(192,57,43,0.08), transparent 45%);
  min-height:100vh;
  font-family:'Space Grotesk', sans-serif;
  color:var(--paper);
  padding:28px 16px 60px;
}

.wrap{
  max-width:1040px;
  margin:0 auto;
}

header.top{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:14px;
  border-bottom:3px solid var(--mustard);
  padding-bottom:14px;
  margin-bottom:26px;
}

header.top h1{
  font-family:'Bebas Neue', sans-serif;
  font-size:clamp(32px, 6vw, 52px);
  letter-spacing:2px;
  color:var(--mustard);
  line-height:1;
}
header.top h1 span{ color:var(--paper); }

.top-nav{
  display:flex;
  gap:16px;
  flex-wrap:wrap;
  margin-top:6px;
}
.top-nav a{
  font-family:'JetBrains Mono', monospace;
  font-size:12px;
  letter-spacing:1px;
  color:var(--paper-dim);
  opacity:.75;
  text-decoration:none;
  border-bottom:1px solid transparent;
  padding-bottom:2px;
  transition: opacity .15s ease, border-color .15s ease, color .15s ease;
}
.top-nav a:hover{
  opacity:1;
  color:var(--mustard);
  border-color:var(--mustard);
}

.header-left{ display:flex; flex-direction:column; width:100%; }

.brand-row{
  display:flex;
  align-items:center;
  gap:14px;
}
.avatar{
  width:56px;
  height:56px;
  border-radius:50%;
  flex-shrink:0;
  box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--mustard);
  overflow:hidden;
}
.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
.brand-text .handle{
  font-family:'JetBrains Mono', monospace;
  font-size:12px;
  letter-spacing:.5px;
  color:var(--paper-dim);
  opacity:.75;
  margin-top:2px;
}
.brand-suffix{
  font-family:'JetBrains Mono', monospace;
  font-size:18px;
  letter-spacing:1px;
  color:var(--mustard);
  margin-left:auto;
  align-self:center;
  white-space:nowrap;
}

.order-total-row{
  display:flex;
  justify-content:space-between;
  align-items:baseline;
  background:var(--board);
  border:1px solid #443a29;
  border-radius:8px;
  padding:14px 18px;
  margin-bottom:12px;
  font-family:'JetBrains Mono', monospace;
}
.order-total-row .label{
  font-size:12px;
  letter-spacing:1px;
  color:var(--paper-dim);
  opacity:.7;
  text-transform:uppercase;
}
.order-total-row .value{
  font-size:26px;
  font-weight:700;
  color:var(--mustard);
}

.grid{
  display:grid;
  grid-template-columns: 1.3fr 1fr;
  gap:24px;
}
@media (max-width: 760px){
  .grid{ grid-template-columns: 1fr; }
}

/* ---------- MENU BOARD ---------- */
.menu-board{
  background:var(--board);
  border:1px solid #443a29;
  border-radius:6px;
  padding:20px;
  max-height:640px;
  overflow-y:auto;
}
.menu-board h2{
  font-family:'Bebas Neue', sans-serif;
  letter-spacing:2px;
  font-size:22px;
  color:var(--paper-dim);
  margin-bottom:16px;
  display:flex;
  align-items:center;
  gap:10px;
}
.menu-board h2::before{
  content:'';
  width:10px; height:10px;
  background:var(--ketchup);
  border-radius:50%;
  display:inline-block;
}

.menu-cat-label{
  font-family:'Bebas Neue', sans-serif;
  letter-spacing:2px;
  font-size:14px;
  color:var(--mustard);
  margin:18px 0 4px;
  padding-bottom:6px;
  border-bottom:1px solid #443a29;
}
.menu-cat-label:first-of-type{ margin-top:0; }

.menu-cat-grid{
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:0 20px;
}
@media (max-width: 560px){
  .menu-cat-grid{ grid-template-columns: 1fr; }
}
.menu-cat-grid .item-row .item-info .name{ font-size:14px; }

/* ---------- TOPPING BOARD ---------- */
.topping-board{
  background:var(--board);
  border:1px solid #443a29;
  border-radius:6px;
  padding:20px;
  margin-top:24px;
}
.topping-board h2{
  font-family:'Bebas Neue', sans-serif;
  letter-spacing:2px;
  font-size:22px;
  color:var(--paper-dim);
  margin-bottom:16px;
  display:flex;
  align-items:center;
  gap:10px;
}
.topping-board h2::before{
  content:'';
  width:10px; height:10px;
  background:var(--lettuce);
  border-radius:50%;
  display:inline-block;
}
.topping-grid{
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:0 24px;
}
@media (max-width: 560px){
  .topping-grid{ grid-template-columns: 1fr; }
}
.topping-grid .item-row{ grid-template-columns: 1fr auto; }
.topping-grid .stepper .plus{ background:var(--lettuce); }
.topping-grid .stepper .plus:hover{ background:#D69433; }

.item-row{
  display:grid;
  grid-template-columns: 1fr auto;
  align-items:center;
  gap:10px;
  padding:14px 4px;
  border-bottom:1px dashed #443a29;
}
.item-row:last-child{ border-bottom:none; }

.item-info .name{
  font-weight:700;
  font-size:16px;
  color:var(--paper);
}
.item-info .price{
  font-family:'JetBrains Mono', monospace;
  font-size:13px;
  color:var(--mustard);
  margin-top:2px;
}

.stepper{
  display:flex;
  align-items:center;
  gap:10px;
  background:#1c1710;
  border-radius:24px;
  padding:4px;
}
.stepper button{
  width:32px; height:32px;
  border-radius:50%;
  border:none;
  cursor:pointer;
  font-size:18px;
  font-weight:700;
  font-family:'Space Grotesk', sans-serif;
  display:flex; align-items:center; justify-content:center;
  transition: transform .08s ease, background .15s ease;
}
.stepper button:active{ transform:scale(0.88); }
.stepper .minus{ background:#3a3226; color:var(--paper-dim); }
.stepper .minus:hover{ background:#4a4030; }
.stepper .plus{ background:var(--ketchup); color:var(--paper); }
.stepper .plus:hover{ background:#d84636; }
.stepper .count{
  min-width:22px;
  text-align:center;
  font-family:'JetBrains Mono', monospace;
  font-weight:700;
  font-size:16px;
  color:var(--paper);
}

/* ---------- RECEIPT ---------- */
.receipt-col{ display:flex; flex-direction:column; gap:20px; }

.receipt{
  margin-top:24px;
  background:var(--paper);
  color:var(--ink);
  border-radius:2px;
  padding:22px 20px 26px;
  font-family:'JetBrains Mono', monospace;
  position:relative;
  box-shadow: 0 12px 28px rgba(0,0,0,0.35);
}
.receipt::after{
  content:'';
  position:absolute;
  left:0; right:0; bottom:-13px;
  height:14px;
  background-image:
    linear-gradient(135deg, var(--paper) 25%, transparent 25%),
    linear-gradient(225deg, var(--paper) 25%, transparent 25%);
  background-position: bottom left;
  background-size: 16px 16px;
  background-repeat: repeat-x;
}

.receipt .r-title{
  text-align:center;
  font-family:'Bebas Neue', sans-serif;
  letter-spacing:3px;
  font-size:22px;
  color:var(--ink);
}
.receipt .r-sub{
  text-align:center;
  font-size:11px;
  letter-spacing:1px;
  color:#7a7263;
  margin-bottom:12px;
}
.hr{
  border:none;
  border-top:1px dashed #b9b09a;
  margin:10px 0;
}

.r-line{
  display:flex;
  justify-content:space-between;
  font-size:13px;
  padding:3px 0;
}
.r-line .qty{ color:#7a7263; margin-left:6px; }
.r-empty{
  text-align:center;
  color:#a49c89;
  font-size:12.5px;
  padding:14px 0;
}

.r-total{
  display:flex;
  justify-content:space-between;
  align-items:baseline;
  margin-top:8px;
  font-size:15px;
  font-weight:700;
}
.r-total .amt{
  font-size:24px;
  color:var(--ketchup);
}

.confirm-wrap{
  margin-top:24px;
}
.confirm-wrap .confirm-btn{ margin-top:0; }

.confirm-btn{
  width:100%;
  margin-top:16px;
  padding:14px;
  border:none;
  border-radius:4px;
  background:var(--ketchup);
  color:var(--paper);
  font-family:'Bebas Neue', sans-serif;
  font-size:20px;
  letter-spacing:3px;
  cursor:pointer;
  transition: background .15s ease, transform .08s ease;
}
.confirm-btn:hover{ background:#d84636; }
.confirm-btn:active{ transform:scale(0.98); }
.confirm-btn:disabled{
  background:#5c5648;
  cursor:not-allowed;
  color:#a49c89;
}

.flash{
  animation: flash-anim .5s ease;
}
@keyframes flash-anim{
  0%{ box-shadow: 0 0 0 4px var(--lettuce), 0 12px 28px rgba(0,0,0,0.35); }
  100%{ box-shadow: 0 12px 28px rgba(0,0,0,0.35); }
}

/* ---------- SALES SUMMARY (bottom) ---------- */
.summary-board{
  background:var(--board);
  border:1px solid #443a29;
  border-radius:6px;
  padding:20px 20px 8px;
  margin-top:24px;
}
.summary-board h2{
  font-family:'Bebas Neue', sans-serif;
  letter-spacing:2px;
  font-size:22px;
  color:var(--paper-dim);
  margin-bottom:16px;
  display:flex;
  align-items:center;
  gap:10px;
}
.summary-board h2::before{
  content:'';
  width:10px; height:10px;
  background:var(--mustard);
  border-radius:50%;
  display:inline-block;
}
.summary-total{
  display:flex;
  justify-content:space-between;
  align-items:baseline;
  background:#1c1710;
  border-radius:6px;
  padding:14px 18px;
  margin-bottom:18px;
}
.summary-total .label{
  font-family:'JetBrains Mono', monospace;
  font-size:13px;
  letter-spacing:1px;
  color:var(--paper-dim);
  opacity:.8;
}
.summary-total .amt{
  font-family:'JetBrains Mono', monospace;
  font-size:30px;
  font-weight:700;
  color:var(--mustard);
}
.summary-sub{
  font-family:'Bebas Neue', sans-serif;
  letter-spacing:2px;
  font-size:15px;
  color:var(--paper-dim);
  opacity:.8;
  margin-bottom:8px;
}
.summary-grid{
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:0 24px;
  max-height:360px;
  overflow-y:auto;
  padding-bottom:12px;
}
@media (max-width: 560px){
  .summary-grid{ grid-template-columns: 1fr; }
}
.hist-row{
  display:flex;
  justify-content:space-between;
  font-family:'JetBrains Mono', monospace;
  font-size:13px;
  padding:8px 0;
  border-bottom:1px solid #382f21;
  color:var(--paper-dim);
}
.hist-row:last-child{ border-bottom:none; }
.hist-row .a{ color:var(--mustard); font-weight:700; }

::-webkit-scrollbar{ width:8px; }
::-webkit-scrollbar-thumb{ background:#443a29; border-radius:4px; }

/* ---------- CORRECTION PANEL ---------- */
.correction-board{
  background:var(--board);
  border:1px solid #443a29;
  border-radius:6px;
  padding:20px;
  margin-top:24px;
}
.correction-board h2{
  font-family:'Bebas Neue', sans-serif;
  letter-spacing:2px;
  font-size:22px;
  color:var(--paper-dim);
  margin-bottom:6px;
  display:flex;
  align-items:center;
  gap:10px;
}
.correction-board h2::before{
  content:'';
  width:10px; height:10px;
  background:var(--ketchup);
  border-radius:50%;
  display:inline-block;
}
.correction-note{
  font-family:'JetBrains Mono', monospace;
  font-size:12px;
  color:var(--paper-dim);
  opacity:.65;
  margin-bottom:16px;
}
.correction-row{
  display:flex;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}
.correction-row select{
  flex:1;
  min-width:180px;
  background:#1c1710;
  color:var(--paper);
  border:1px solid #443a29;
  border-radius:8px;
  padding:10px 12px;
  font-family:'Space Grotesk', sans-serif;
  font-size:14px;
}
.correction-row select:focus{ outline:2px solid var(--mustard); }
.correct-btn{
  background:var(--ketchup);
  color:var(--paper);
  border:none;
  border-radius:8px;
  padding:11px 20px;
  font-family:'Bebas Neue', sans-serif;
  font-size:16px;
  letter-spacing:2px;
  cursor:pointer;
  transition: background .15s ease, transform .08s ease;
}
.correct-btn:hover{ background:#d84636; }
.correct-btn:active{ transform:scale(0.96); }
</style>
</head>

  <div class="menu-board">
    <h2>MENU</h2>
    <div id="menuList"></div>
  </div>

  <div class="topping-board" id="topping-section">
    <h2>TOPPING</h2>
    <div class="topping-grid" id="toppingList"></div>
  </div>

  <div class="receipt" id="receipt">
    <div id="receiptLines"></div>
  </div>

  <div class="confirm-wrap">
    <div class="order-total-row">
      <span class="label">合計</span>
      <span class="value" id="orderTotal">¥0</span>
    </div>
    <button class="confirm-btn" id="confirmBtn" disabled>決定 CONFIRM</button>
  </div>

  <div class="summary-board">
    <h2>SALES SUMMARY</h2>
    <div class="summary-total">
      <span class="label">合計売上金額</span>
      <span class="amt" id="totalSales">¥0</span>
    </div>
    <div class="summary-sub">バーガー別 販売数</div>
    <div class="summary-grid" id="historyList"></div>
  </div>

  <div class="correction-board">
    <h2>CORRECTION</h2>
    <div class="correction-note">入力ミスした時、商品と数量を選んで売上から取り消せます</div>
    <div class="correction-row">
      <select id="correctItem"></select>
      <div class="stepper">
        <button class="minus" id="correctMinus" aria-label="減らす">−</button>
        <span class="count" id="correctQtyDisplay">1</span>
        <button class="plus" id="correctPlus" aria-label="増やす">＋</button>
      </div>
      <button class="correct-btn" id="correctBtn">取り消す</button>
    </div>
  </div>
</div>

<script>
const menu = [
  // ---- SINGLE MENU ----
  { name: "ハンバーガー",                 price: 1200, cat: "single" },
  { name: "チーズバーガー",               price: 1300, cat: "single" },
  { name: "モッツアレラバーガー",         price: 1300, cat: "single" },
  { name: "ベーコンチーズバーガー",       price: 1500, cat: "single" },
  { name: "ベーコンモッツアレラバーガー", price: 1500, cat: "single" },
  { name: "エッグベーコンチーズバーガー", price: 1700, cat: "single" },
  { name: "エッグハンバーガー",           price: 1400, cat: "single" },
  { name: "エッグチーズバーガー",         price: 1500, cat: "single" },
  { name: "エッグモッツアレラバーガー",   price: 1500, cat: "single" },
  { name: "ベリーモッツアレラバーガー",   price: 1500, cat: "single" },
  { name: "ネギバーガー",                 price: 1300, cat: "single" },
  { name: "ネギチーズバーガー",           price: 1500, cat: "single" },
  // ---- DOUBLE MENU ----
  { name: "ダブルバーガー",                       price: 1700, cat: "double" },
  { name: "ダブルチーズバーガー",                 price: 2000, cat: "double" },
  { name: "ダブルモッツアレラバーガー",           price: 2000, cat: "double" },
  { name: "ダブルベーコンチーズバーガー",         price: 2200, cat: "double" },
  { name: "2種ダブルチーズバーガー",              price: 2000, cat: "double" },
  { name: "2種ダブルチーズエッグバーガー",        price: 2200, cat: "double" },
  { name: "2種ダブルチーズベーコンバーガー",      price: 2200, cat: "double" },
  { name: "2種ダブルチーズエッグベーコンバーガー", price: 2400, cat: "double" },
  { name: "ベリーベリーモッツアレラバーガー",     price: 2000, cat: "double" },
  { name: "2種ダブルチーズネギバーガー",          price: 2200, cat: "double" },
  { name: "ダブルネギチーズバーガー",             price: 2000, cat: "double" },
  // ---- TODAY'S MENU (数量限定) ----
  { name: "しいたけバーガー",             price: 1500, cat: "limited" },
  { name: "しいたけチーズバーガー",       price: 1700, cat: "limited" },
  { name: "しいたけベーコンチーズバーガー", price: 1900, cat: "limited" },
];

const toppings = [
  { name: "エッグ",           price: 200 },
  { name: "ベーコン",         price: 200 },
  { name: "ねぎ",             price: 200 },
  { name: "チェダーチーズ",   price: 200 },
  { name: "モッツァレラチーズ", price: 200 },
  { name: "ボブベリージャム", price: 200 },
  { name: "パティー",         price: 500 },
];

let counts = menu.map(() => 0);
let toppingCounts = toppings.map(() => 0);
let burgerSalesCount = menu.map(() => 0); // 累計販売数(バーガーのみ)
let todaySales = 0;

const yen = n => "¥" + n.toLocaleString("ja-JP");

const CATEGORIES = [
  { key: "single",  label: "SINGLE MENU" },
  { key: "double",  label: "DOUBLE MENU" },
  { key: "limited", label: "TODAY'S MENU(数量限定)" },
];

function itemRowHtml(item, i, count){
  return `
    <div class="item-row">
      <div class="item-info">
        <div class="name">${item.name}</div>
        <div class="price">${yen(item.price)}</div>
      </div>
      <div class="stepper">
        <button class="minus" data-i="${i}" data-d="-1" aria-label="減らす">−</button>
        <span class="count" id="count-${i}">${count}</span>
        <button class="plus" data-i="${i}" data-d="1" aria-label="増やす">＋</button>
      </div>
    </div>`;
}

function renderMenu(){
  const el = document.getElementById("menuList");

  let html = "";
  CATEGORIES.forEach(cat => {
    const rows = menu
      .map((item, i) => ({ item, i }))
      .filter(x => x.item.cat === cat.key);
    if (rows.length === 0) return;
    html += `<div class="menu-cat-label" id="cat-${cat.key}">${cat.label}</div>`;
    html += `<div class="menu-cat-grid">`;
    html += rows.map(({ item, i }) => itemRowHtml(item, i, counts[i])).join("");
    html += `</div>`;
  });
  el.innerHTML = html;

  el.querySelectorAll("button").forEach(btn => {
    btn.addEventListener("click", () => {
      const i = Number(btn.dataset.i);
      const d = Number(btn.dataset.d);
      counts[i] = Math.max(0, counts[i] + d);
      document.getElementById(`count-${i}`).textContent = counts[i];
      renderReceipt();
    });
  });
}

function renderToppings(){
  const el = document.getElementById("toppingList");
  el.innerHTML = toppings.map((item, i) => `
    <div class="item-row">
      <div class="item-info">
        <div class="name">${item.name}</div>
        <div class="price">${yen(item.price)}</div>
      </div>
      <div class="stepper">
        <button class="minus" data-i="${i}" data-d="-1" aria-label="減らす">−</button>
        <span class="count" id="topping-count-${i}">${toppingCounts[i]}</span>
        <button class="plus" data-i="${i}" data-d="1" aria-label="増やす">＋</button>
      </div>
    </div>
  `).join("");

  el.querySelectorAll("button").forEach(btn => {
    btn.addEventListener("click", () => {
      const i = Number(btn.dataset.i);
      const d = Number(btn.dataset.d);
      toppingCounts[i] = Math.max(0, toppingCounts[i] + d);
      document.getElementById(`topping-count-${i}`).textContent = toppingCounts[i];
      renderReceipt();
    });
  });
}

function renderReceipt(){
  const linesEl = document.getElementById("receiptLines");
  const totalEl = document.getElementById("orderTotal");
  const btn = document.getElementById("confirmBtn");

  let total = 0;
  let lines = "";
  menu.forEach((item, i) => {
    if (counts[i] > 0){
      const sub = item.price * counts[i];
      total += sub;
      lines += `
        <div class="r-line">
          <span>${item.name}<span class="qty">×${counts[i]}</span></span>
          <span>${yen(sub)}</span>
        </div>`;
    }
  });
  toppings.forEach((item, i) => {
    if (toppingCounts[i] > 0){
      const sub = item.price * toppingCounts[i];
      total += sub;
      lines += `
        <div class="r-line">
          <span>+ ${item.name}<span class="qty">×${toppingCounts[i]}</span></span>
          <span>${yen(sub)}</span>
        </div>`;
    }
  });

  linesEl.innerHTML = lines || `<div class="r-empty">商品を選択してください</div>`;
  totalEl.textContent = yen(total);
  btn.disabled = total === 0;
}

function renderBurgerStats(){
  const el = document.getElementById("historyList");
  el.innerHTML = menu.map((item, i) => `
    <div class="hist-row">
      <span>${item.name}</span>
      <span class="a">${burgerSalesCount[i]} 個</span>
    </div>
  `).join("");
}

function renderStats(){
  document.getElementById("totalSales").textContent = yen(todaySales);
}

// ---------- CORRECTION PANEL ----------
let correctQty = 1;

function renderCorrectionOptions(){
  const sel = document.getElementById("correctItem");
  sel.innerHTML = menu.map((item, i) =>
    `<option value="${i}">${item.name}(${yen(item.price)})</option>`
  ).join("");
}

function renderCorrectQty(){
  document.getElementById("correctQtyDisplay").textContent = correctQty;
}

document.getElementById("correctMinus").addEventListener("click", () => {
  correctQty = Math.max(1, correctQty - 1);
  renderCorrectQty();
});
document.getElementById("correctPlus").addEventListener("click", () => {
  correctQty = correctQty + 1;
  renderCorrectQty();
});

document.getElementById("correctBtn").addEventListener("click", () => {
  const i = Number(document.getElementById("correctItem").value);
  const item = menu[i];
  if (!item) return;

  burgerSalesCount[i] = Math.max(0, burgerSalesCount[i] - correctQty);
  todaySales = Math.max(0, todaySales - item.price * correctQty);

  correctQty = 1;
  renderCorrectQty();
  renderBurgerStats();
  renderStats();

  const board = document.querySelector(".summary-board");
  board.classList.remove("flash");
  void board.offsetWidth;
  board.classList.add("flash");
});

document.getElementById("confirmBtn").addEventListener("click", () => {
  let total = 0;
  let hasItems = false;

  menu.forEach((item, i) => {
    if (counts[i] > 0){
      total += item.price * counts[i];
      burgerSalesCount[i] += counts[i];
      hasItems = true;
    }
  });
  toppings.forEach((item, i) => {
    if (toppingCounts[i] > 0){
      total += item.price * toppingCounts[i];
      hasItems = true;
    }
  });
  if (!hasItems) return;

  todaySales += total;

  counts = menu.map(() => 0);
  toppingCounts = toppings.map(() => 0);

  renderMenu();
  renderToppings();
  renderReceipt();
  renderBurgerStats();
  renderStats();

  const receipt = document.getElementById("receipt");
  receipt.classList.remove("flash");
  void receipt.offsetWidth;
  receipt.classList.add("flash");
});

renderMenu();
renderToppings();
renderReceipt();
renderBurgerStats();
renderStats();
renderCorrectionOptions();
renderCorrectQty();
</script>

</body>
</html>
